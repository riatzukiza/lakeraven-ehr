# Reportable Conditions — NYS/CDC Notifiable Disease List
#
# ONC § 170.315(f)(5) — Electronic Case Reporting
#
# ICD-10-CM codes and prefixes for conditions reportable to
# NYS ECLRS and CDC NNDSS. Prefix matches (e.g. "A15") will
# match any code starting with that prefix (A15.0, A15.1, etc.).
#
# Sources:
#   - NYS Communicable Disease Reporting Requirements (10 NYCRR 2.10)
#   - CDC NNDSS Notifiable Conditions (2026)
#   - CSTE Position Statements
#
# Ulster County relevance: STI/HIV, TB, Hep B, lead, communicable disease

