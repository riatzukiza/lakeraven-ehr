# Reportable Lab Tests — NYS/CDC Notifiable Laboratory Tests
#
# ONC § 170.315(f)(3) — Electronic Laboratory Reporting
#
# LOINC codes for laboratory tests reportable to NYS ECLRS.
# When a lab result matches a LOINC code in this list, an HL7 v2.5.1
# ORU message should be generated and transmitted to ECLRS.
#
# Sources:
#   - NYS Communicable Disease Reporting Requirements (10 NYCRR 2.10)
#   - CDC NNDSS Notifiable Conditions (2026)
#   - APHL/CDC ELR Implementation Guide
#
# Ulster County relevance: STI/HIV, TB, Hep B, lead, communicable disease

